<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Desert | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', cursive;
            background-color: #000000;
            color: #39ff14;
            line-height: 1.8;
            margin: 0;
            padding: 20px;
        }
        header {
            background: #111;
            border: 4px solid #39ff14;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
        }
        nav a {
            color: #00ffff;
            margin: 0 15px;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 14px;
        }
        nav a:hover {
            color: #ff00ff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            border: 4px solid #39ff14;
            background-color: #111;
            padding: 20px;
            text-align: center;
        }
        .hero {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 4px dashed #39ff14;
            padding-bottom: 20px;
        }
        h1, h2 {
            color: #ff9900;
            text-align: center;
            font-size: 18px;
        }
        p {
            font-size: 12px;
        }
        .btn {
            display: inline-block;
            background: #000;
            color: #00ffff;
            border: 2px solid #00ffff;
            padding: 10px 15px;
            text-decoration: none;
            margin-top: 20px;
            font-size: 12px;
        }
        .btn:hover {
            background: #00ffff;
            color: #000;
        }
        img {
            max-width: 100%;
            height: auto;
            image-rendering: pixelated;
            border: 2px solid #ff9900;
            margin: 10px auto;
            display: block;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 10px;
            color: #555;
        }
    </style>
</head>
<body>

<header>
    <nav>
        <a href="index.html">Home</a>
        <a href="games.html">Games</a>
    </nav>
</header>

<div class="container">
    <section class="hero">
        <h1>Welcome to The Desert</h1>
        <p>Independent Game Development & Design</p>
        <a href="games.html" class="btn">View My Games</a>
    </section>

    <h2>Latest Project: WellBound</h2>
    <img src="screenshot.png" alt="Game Screenshot">
    <a href="https://store.steampowered.com/app/4292280/WellBound/" target="_blank" class="btn">View on Steam</a>
</div>

<footer>
    <p>&copy; 2026 The Desert. All rights reserved.</p>
</footer>

</body>
</html>
