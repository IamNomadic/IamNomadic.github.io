<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadSandGames | Secret</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', cursive;
            background: linear-gradient(to bottom, #120024 0%, #4a0063 35%, #ff0066 50%, #00ffff 50.5%, #000000 51%, #120024 100%);
            background-attachment: fixed;
            color: #000000;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            position: relative;
            z-index: 0;
            overflow-x: hidden;
        }

        @keyframes panStarsReverse {
            from {
                background-position: 400px 0, 240px 60px, 430px 270px, 220px 100px;
            }

            to {
                background-position: 0 0, 40px 60px, 130px 270px, 70px 100px;
            }
        }

        @keyframes moveGridFast {
            0% {
                transform: perspective(200px) rotateX(75deg) translateY(0px);
            }

            100% {
                transform: perspective(200px) rotateX(75deg) translateY(50px);
            }
        }

        @keyframes floatSlow {
            0%, 100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        .sky-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 51%;
            background-image: radial-gradient(circle, white 2px, transparent 2px), radial-gradient(circle, white 1px, transparent 1px), radial-gradient(circle, white 1.5px, transparent 1.5px), radial-gradient(circle, white 1px, transparent 1px);
            background-size: 400px 400px, 200px 200px, 300px 300px, 150px 150px;
            opacity: 0.6;
            z-index: -3;
            pointer-events: none;
            animation: panStarsReverse 60s linear infinite;
        }

        .moon {
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(to bottom, #ffeb3b 0%, #ff0066 100%);
            box-shadow: 0 0 50px #ff0066;
            z-index: -2;
            -webkit-mask-image: repeating-linear-gradient(to bottom, black 0px, black 16px, transparent 16px, transparent 20px);
            mask-image: repeating-linear-gradient(to bottom, black 0px, black 16px, transparent 16px, transparent 20px);
        }

        .planet {
            position: fixed;
            border-radius: 50%;
            z-index: -2;
        }

        .planet-1 {
            top: 5%;
            right: 5%;
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            box-shadow: inset -20px -20px 40px rgba(0,0,0,0.5), 0 0 40px rgba(255, 255, 255, 0.6);
            animation: floatSlow 10s ease-in-out infinite;
        }

        .grid-wrapper {
            position: fixed;
            top: 51%;
            left: 0;
            width: 100vw;
            height: 49vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 100%);
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: -50vw;
            width: 200vw;
            height: 200vh;
            background-image: linear-gradient(rgba(255, 0, 255, 0.6) 2px, transparent 2px), linear-gradient(90deg, rgba(255, 0, 255, 0.6) 2px, transparent 2px);
            background-size: 50px 50px;
            background-position: center top;
            transform-origin: top center;
            animation: moveGridFast 2s linear infinite; /* Faster grid */
        }

        .window {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 50px auto;
            background-color: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #000000;
            border-bottom: 2px solid #000000;
            padding: 2px;
        }

        .title-bar {
            background-color: #000080;
            color: #ffffff;
            padding: 5px 10px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-bar-controls {
            display: flex;
            gap: 2px;
        }

        .title-bar-btn {
            background: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #000000;
            border-bottom: 2px solid #000000;
            width: 16px;
            height: 16px;
        }

        .content {
            padding: 40px;
            text-align: center;
        }

        h1 {
            font-size: 18px;
            margin: 0;
            color: #000000;
        }

        .btn {
            display: inline-block;
            background-color: #c0c0c0;
            color: #000000;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #000000;
            border-bottom: 2px solid #000000;
            padding: 10px 15px;
            text-decoration: none;
            margin-top: 30px;
            font-size: 10px;
            text-align: center;
        }

            .btn:active {
                border-top: 2px solid #000000;
                border-left: 2px solid #000000;
                border-right: 2px solid #ffffff;
                border-bottom: 2px solid #ffffff;
                background-color: #f2ed88;
            }

        img {
            max-width: 100%;
            height: auto;
            image-rendering: pixelated;
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            margin: 10px auto;
            display: block;
            background-color: #000000;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90vh;
            margin-top: 5vh;
            border: 2px solid #c0c0c0;
        }

        .close {
            position: absolute;
            top: 15px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="sky-texture"></div>
    <div class="moon"></div>
    <div class="planet planet-1"></div>

    <div class="grid-wrapper">
        <div class="grid-overlay"></div>
    </div>

    <div class="window">
        <div class="title-bar">
            <span>Secret</span>
            <div class="title-bar-controls">
                <div class="title-bar-btn"></div>
                <div class="title-bar-btn"></div>
                <div class="title-bar-btn"></div>
            </div>
        </div>

        <div class="content">
            <h1>you found the secret</h1>
            <br>
            <a href="index.html" class="btn">Back to Home</a>
        </div>
    </div>

    <div id="imageModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="modalImg">
    </div>

    <script>
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("modalImg");
        const span = document.getElementsByClassName("close")[0];
        const contentImages = document.querySelectorAll(".content img");

        if (modal && contentImages.length > 0) {
            contentImages.forEach(img => {
                img.style.cursor = "pointer";
                img.onclick = function () {
                    modal.style.display = "block";
                    modalImg.src = this.src;
                }
            });

            span.onclick = function () { modal.style.display = "none"; }
            modal.onclick = function (e) { if (e.target !== modalImg) modal.style.display = "none"; }
        }
    </script>

</body>
</html>
