<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadSandGames | YouTube</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', cursive;
            background-color: #008080;
            color: #000000;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .window {
            max-width: 800px;
            margin: 0 auto;
            background-color: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #000000;
            border-bottom: 2px solid #000000;
            padding: 2px;
        }
        .title-bar {
            background-color: #000080;
            color: #ffffff;
            padding: 5px 10px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .title-bar-controls {
            display: flex;
            gap: 2px;
        }
        .title-bar-btn {
            background: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #000000;
            border-bottom: 2px solid #000000;
            width: 16px;
            height: 16px;
        }
        .content {
            padding: 20px;
            text-align: center;
        }
        nav {
            margin-bottom: 20px;
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            padding: 10px;
            text-align: left;
        }
        nav a {
            color: #000000;
            margin-right: 15px;
            text-decoration: none;
            font-size: 12px;
        }
        nav a:hover {
            color: #00ffbb;
        }
        h1 { font-size: 18px; }
        p { font-size: 10px; }
        .btn {
            display: inline-block;
            background-color: #c0c0c0;
            color: #000000;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #000000;
            border-bottom: 2px solid #000000;
            padding: 10px 15px;
            text-decoration: none;
            margin-top: 20px;
            font-size: 10px;
        }
        .btn:active {
            border-top: 2px solid #000000;
            border-left: 2px solid #000000;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            background-color: #f2ed88;
        }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <span>YouTube</span>
        <div class="title-bar-controls">
            <div class="title-bar-btn"></div>
            <div class="title-bar-btn"></div>
            <div class="title-bar-btn"></div>
        </div>
    </div>

    <div class="content">
        <nav>
            <a href="index.html">Home</a>
            <a href="games.html">Games</a>
            <a href="minecraft.html">Minecraft</a>
            <a href="youtube.html">YouTube</a>
        </nav>

        <h1>YouTube Channel</h1>
        <p>Check out devlogs and trailers for MadSandGames projects.</p>
        <a href="https://www.youtube.com/@MadSandGames" target="_blank" class="btn">Visit MadSandGames on YouTube</a>
    </div>
</div>

</body>
</html>
