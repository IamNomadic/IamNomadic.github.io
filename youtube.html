<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadSandGames | YouTube</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', cursive;
            background: linear-gradient(to bottom, #120024 0%, #4a0063 35%, #ff0066 50%, #00ffff 50.5%, #000000 51%, #120024 100%);
            background-attachment: fixed;
            color: #000000;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            position: relative;
            z-index: 0;
            overflow-x: hidden;
        }

        .sky-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 51%;
            background-image: radial-gradient(circle, white 2px, transparent 2px), radial-gradient(circle, white 1px, transparent 1px), radial-gradient(circle, white 1.5px, transparent 1.5px), radial-gradient(circle, white 1px, transparent 1px);
            background-size: 400px 400px, 200px 200px, 300px 300px, 150px 150px;
            background-position: 0 0, 40px 60px, 130px 270px, 70px 100px;
            opacity: 0.6;
            z-index: -3;
            pointer-events: none;
        }

        .moon {
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(to bottom, #ffeb3b 0%, #ff0066 100%);
            box-shadow: 0 0 50px #ff0066;
            z-index: -2;
            -webkit-mask-image: repeating-linear-gradient(to bottom, black 0px, black 16px, transparent 16px, transparent 20px);
            mask-image: repeating-linear-gradient(to bottom, black 0px, black 16px, transparent 16px, transparent 20px);
        }

        .grid-overlay {
            position: fixed;
            top: 51%;
            left: -50vw;
            width: 200vw;
            height: 100vh;
            background-image: linear-gradient(rgba(255, 0, 255, 0.6) 2px, transparent 2px), linear-gradient(90deg, rgba(255, 0, 255, 0.6) 2px, transparent 2px);
            background-size: 50px 50px;
            background-position: center top;
            transform: perspective(400px) rotateX(60deg);
            transform-origin: top center;
            z-index: -1;
            pointer-events: none;
        }

        .window {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            background-color: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #000000;
            border-bottom: 2px solid #000000;
            padding: 2px;
        }

        .title-bar {
            background-color: #000080;
            color: #ffffff;
            padding: 5px 10px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-bar-controls {
            display: flex;
            gap: 2px;
        }

        .title-bar-btn {
            background: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #000000;
            border-bottom: 2px solid #000000;
            width: 16px;
            height: 16px;
        }

        .content {
            padding: 20px;
            text-align: center;
        }

        nav {
            margin-bottom: 20px;
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            padding: 10px;
            text-align: left;
        }

            nav a {
                color: #000000;
                margin-right: 15px;
                text-decoration: none;
                font-size: 12px;
            }

                nav a:hover {
                    color: #00ffbb;
                }

        h1 {
            font-size: 18px;
        }

        p {
            font-size: 10px;
        }

        .video-box {
            background: #008080;
            color: #e6ccff;
            padding: 15px;
            margin-top: 20px;
            border: 2px inset #ffffff;
            text-align: left;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border: 2px solid #000;
            margin-top: 10px;
        }

            .video-container iframe {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }

        .highlight {
            color: #000000;
        }

        .button-group {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            background-color: #c0c0c0;
            color: #000000;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #000000;
            border-bottom: 2px solid #000000;
            padding: 10px 15px;
            text-decoration: none;
            font-size: 10px;
        }

            .btn:active {
                border-top: 2px solid #000000;
                border-left: 2px solid #000000;
                border-right: 2px solid #ffffff;
                border-bottom: 2px solid #ffffff;
                background-color: #f2ed88;
            }

        img {
            max-width: 100%;
            height: auto;
            image-rendering: pixelated;
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            margin: 10px auto;
            display: block;
            background-color: #000000;
        }
    </style>
</head>
<body>

    <div class="sky-texture"></div>
    <div class="moon"></div>
    <div class="grid-overlay"></div>

    <div class="window">
        <div class="title-bar">
            <span>MadSandGames_YouTube</span>
            <div class="title-bar-controls">
                <div class="title-bar-btn"></div>
                <div class="title-bar-btn"></div>
                <div class="title-bar-btn"></div>
            </div>
        </div>

        <div class="content">
            <nav>
                <a href="index.html">Home</a>
                <a href="games.html">Games</a>
                <a href="minecraft.html">Minecraft</a>
                <a href="youtube.html">YouTube</a>
            </nav>

            <h1>YouTube Channel</h1>
            <p>Stay updated with the latest devlogs and project trailers.</p>

            <div class="video-box">
                <p><span class="highlight">[</span>Latest Uploads<span class="highlight">]</span></p>
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/videoseries?list=UUtgvw9CAlgCO_zAlVJsnJ7g"
                            frameborder="0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                            allowfullscreen>
                    </iframe>
                </div>
            </div>

            <div class="button-group">
                <a href="https://www.youtube.com/@MadSandGames" target="_blank" class="btn">Visit Channel</a>
                <a href="https://www.youtube.com/@MadSandGames?sub_confirmation=1" target="_blank" class="btn" style="color: #000000;">Subscribe</a>
            </div>
        </div>
    </div>

</body>
</html>
