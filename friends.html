<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadSandGames | Friends</title>
    <meta name="description" content="Friends and supporters of MadSandGames.">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', cursive;
            background: linear-gradient(to bottom, #120024 0%, #4a0063 35%, #ff0066 50%, #00ffff 50.5%, #000000 51%, #120024 100%);
            background-attachment: fixed;
            color: #000000;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            position: relative;
            z-index: 0;
            overflow-x: hidden;
        }

        @keyframes panStars {
            from {
                background-position: 0 0, 80px 120px, 260px 540px, 140px 200px;
            }

            to {
                background-position: -400px 0, -160px 120px, -140px 540px, -260px 200px;
            }
        }

        @keyframes moveGrid {
            0% {
                transform: perspective(200px) rotateX(75deg) translateY(0px);
            }

            100% {
                transform: perspective(200px) rotateX(75deg) translateY(50px);
            }
        }

        @keyframes floatSlow {
            0%, 100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes floatMedium {
            0%, 100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes floatFast {
            0%, 100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .sky-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 51%;
            background-image: radial-gradient(circle, white 2px, transparent 2px), radial-gradient(circle, white 1px, transparent 1px), radial-gradient(circle, white 1.5px, transparent 1.5px), radial-gradient(circle, white 1px, transparent 1px);
            background-size: 400px 400px, 200px 200px, 300px 300px, 150px 150px;
            background-position: 0 0, 80px 120px, 260px 540px, 140px 200px;
            opacity: 0.6;
            z-index: -3;
            pointer-events: none;
            animation: panStars 100s linear infinite;
        }

        .moon {
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(to bottom, #ffeb3b 0%, #ff0066 100%);
            box-shadow: 0 0 50px #ff0066;
            z-index: -2;
            -webkit-mask-image: repeating-linear-gradient(to bottom, black 0px, black 16px, transparent 16px, transparent 20px);
            mask-image: repeating-linear-gradient(to bottom, black 0px, black 16px, transparent 16px, transparent 20px);
        }

        .planet {
            position: fixed;
            border-radius: 50%;
            z-index: -2;
        }

        .planet-1 {
            top: 15%;
            left: 15%;
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #00ff87 0%, #60efff 100%);
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.5), 0 0 20px rgba(0, 255, 135, 0.4);
            animation: floatSlow 8s ease-in-out infinite;
        }

        .planet-2 {
            top: 25%;
            right: 15%;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.5);
            transform-style: preserve-3d;
            animation: floatMedium 6s ease-in-out infinite;
        }

        .planet-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 140px;
            height: 140px;
            border: 8px solid rgba(255, 8, 68, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%) rotateX(75deg) rotateY(15deg);
            box-shadow: 0 0 10px rgba(255, 8, 68, 0.8), inset 0 0 10px rgba(255, 8, 68, 0.8);
        }

        .planet-3 {
            top: 40%;
            left: 35%;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #b224ef 0%, #7579ff 100%);
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.5);
            animation: floatFast 5s ease-in-out infinite 1s;
        }

        .grid-wrapper {
            position: fixed;
            top: 51%;
            left: 0;
            width: 100vw;
            height: 49vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 100%);
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: -50vw;
            width: 200vw;
            height: 200vh;
            background-image: linear-gradient(rgba(255, 0, 255, 0.6) 2px, transparent 2px), linear-gradient(90deg, rgba(255, 0, 255, 0.6) 2px, transparent 2px);
            background-size: 50px 50px;
            background-position: center top;
            transform-origin: top center;
            animation: moveGrid 4s linear infinite;
        }

        .window {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            background-color: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #000000;
            border-bottom: 2px solid #000000;
            padding: 2px;
        }

        .title-bar {
            background-color: #000080;
            color: #ffffff;
            padding: 5px 10px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-bar-controls {
            display: flex;
            gap: 2px;
        }

        .title-bar-btn {
            background: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #000000;
            border-bottom: 2px solid #000000;
            width: 16px;
            height: 16px;
        }

        .content {
            padding: 20px;
        }

        nav {
            margin-bottom: 20px;
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            padding: 10px;
        }

            nav a {
                color: #000000;
                margin-right: 15px;
                text-decoration: none;
                font-size: 12px;
            }

                nav a:hover {
                    color: #00ffbb;
                }

        h1, h2 {
            font-size: 16px;
            margin-top: 0;
        }

        p {
            font-size: 10px;
        }

        .btn {
            display: inline-block;
            background-color: #c0c0c0;
            color: #000000;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #000000;
            border-bottom: 2px solid #000000;
            padding: 10px 15px;
            text-decoration: none;
            margin-top: 10px;
            margin-bottom: 20px;
            font-size: 10px;
            text-align: center;
        }

            .btn:active {
                border-top: 2px solid #000000;
                border-left: 2px solid #000000;
                border-right: 2px solid #ffffff;
                border-bottom: 2px solid #ffffff;
                background-color: #f2ed88;
            }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 8px;
        }
        
        .friend-block {
            border-bottom: 2px dashed #808080;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        
        .friend-block:last-child {
            border-bottom: none;
        }

    </style>
</head>
<body>

    <div class="sky-texture"></div>
    <div class="moon"></div>
    <div class="planet planet-1"></div>
    <div class="planet planet-2">
        <div class="planet-ring"></div>
    </div>
    <div class="planet planet-3"></div>

    <div class="grid-wrapper">
        <div class="grid-overlay"></div>
    </div>

    <div class="window">
        <div class="title-bar">
            <span>MadSandGames_Friends</span>
            <div class="title-bar-controls">
                <div class="title-bar-btn"></div>
                <div class="title-bar-btn"></div>
                <div class="title-bar-btn"></div>
            </div>
        </div>

        <div class="content">
            <nav>
                <a href="index.html">Home</a>
                <a href="games.html">Games</a>
                <a href="minecraft.html">Minecraft</a>
                <a href="youtube.html">YouTube</a>
                <a href="support.html">Support Me!</a>
            </nav>

            <div style="text-align: center; margin-bottom: 30px;">
                <h1>Friends & Supporters</h1>
            </div>

            <div class="friend-block">
                <h2>sean lynch</h2>
                <a href="https://www.linkedin.com/in/seanzolynch/" target="_blank" class="btn">LinkedIn</a>
            </div>

            <div class="friend-block">
                <h2>noah - funkas</h2>

            <div class="friend-block">
                <h2>dev friend</h2>
                <a href="https://www.youtube.com/@BreadHeadST" target="_blank" class="btn">YouTube</a>
            </div>

            <div class="friend-block">
                <h2>dev friend</h2>
                <a href="https://www.youtube.com/@cintechstudios" target="_blank" class="btn">YouTube</a>
            </div>

            <div class="footer-text">
                <p>&copy; 2026 MadSandGames. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script>
        const konamiCode = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
        let currentPosition = 0;

        document.addEventListener('keydown', (e) => {
            if (e.key === konamiCode[currentPosition]) {
                currentPosition++;
                if (currentPosition === konamiCode.length) {
                    window.location.href = 'secret.html';
                    currentPosition = 0;
                }
            } else {
                currentPosition = 0;
            }
        });
    </script>

</body>
</html>
