<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0c10;
            color: #66fcf1;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
            text-align: center;
        }

        .navbar {
            display: flex;
            justify-content: center;
            gap: 20px;
            background-color: rgba(31, 40, 51, 0.9);
            padding: 15px;
            border-bottom: 2px solid #45a29e;
            position: relative;
            z-index: 10;
        }

        .navbar a {
            color: #66fcf1;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .navbar a:hover {
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }

        .content-container {
            position: relative;
            z-index: 10;
            margin-top: 50px;
            padding: 20px;
            background: rgba(11, 12, 16, 0.7);
            display: inline-block;
            border: 1px solid #45a29e;
            box-shadow: 0 0 15px #45a29e;
        }

        .friend-entry {
            margin: 30px 0;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .friend-entry a {
            color: #ff00ff;
            text-decoration: none;
            margin: 0 10px;
        }

        .friend-entry a:hover {
            color: #00ffff;
            text-shadow: 0 0 8px #00ffff;
        }

        /* Vaporwave Background Elements */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: drift 100s linear infinite;
            z-index: 1;
        }

        @keyframes drift {
            from { transform: translateY(0); }
            to { transform: translateY(-100vh); }
        }

        .grid {
            position: fixed;
            bottom: 0;
            left: -50%;
            width: 200%;
            height: 40vh;
            background-image: 
                linear-gradient(to right, #ff00ff 1px, transparent 1px),
                linear-gradient(to top, #ff00ff 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            z-index: 2;
            animation: moveGrid 5s linear infinite;
        }

        @keyframes moveGrid {
            from { background-position: 0 0; }
            to { background-position: 0 50px; }
        }

        /* New Planets */
        .planet-green {
            position: fixed;
            top: 15%;
            left: 10%;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ff00, #003300);
            box-shadow: 0 0 30px #00ff00;
            z-index: 1;
        }

        .planet-orange {
            position: fixed;
            top: 40%;
            right: 15%;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff8c00, #800000);
            box-shadow: 0 0 20px #ff8c00;
            z-index: 1;
        }
    </style>
</head>
<body>
